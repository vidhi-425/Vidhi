<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F172A;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fade 1s;
    }

    .active {
      display: flex;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    button {
      padding: 12px 24px;
      margin-top: 20px;
      background: #3B82F6;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 16px;
    }

    h1 {
      max-width: 80%;
      line-height: 1.5;
    }

    img {
      margin-top: 20px;
      width: 120px;
      animation: pop 1s ease;
    }

    @keyframes pop {
      from {transform: scale(0);}
      to {transform: scale(1);}
    }
  </style>
</head>

<body>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">  
</audio>

<div class="screen active" id="s1">
  <h1>Hey… don’t click this 👀</h1>
  <button onclick="next('s2')">Okay fine, click me 🙄</button>
</div>

<div class="screen" id="s2">
  <h1 id="t2"></h1>
  <button onclick="next('s3')">Continue 😏</button>
</div>

<div class="screen" id="s3">
  <h1 id="t3"></h1>
  <button onclick="next('s4')">Last one 👀</button>
</div>

<div class="screen" id="s4">
  <h1 id="t4"></h1>
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">

  <button onclick="this.innerText='Bas itna hi cake milega 😌'">
    cut the cake
  </button>
</div>

<script>
function next(id) {
  let current = document.querySelector('.active');
  if(current) current.classList.remove('active');

  let nextScreen = document.getElementById(id);
  if(nextScreen) nextScreen.classList.add('active');

  // Play music only on last screen
  if(id === 's4') {
    let music = document.getElementById("music");
    if(music) {
      music.play().catch(() => {});
    }
  }
}

// Typing effect (safe version)
function typeText(element, text, speed = 40) {
  if(!element) return;
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// Run after page loads
window.onload = function() {
  typeText(document.getElementById("t1"), "Hey… don’t click this 👀");
  typeText(document.getElementById("t2"), "Don’t get used to this…\nI don’t usually say nice things 🫣");
  typeText(document.getElementById("t3"), "But \nyou’re actually so much important to me.\n & I love your presence 🫶🏼");
  typeText(document.getElementById("t4"), "🎂 Happy Birthday mere boondi ke laddu 😋🎉\n\n I LOVE YOU SOO MUCH ❤️🥰");
};
  </script>

</body>
</html>
