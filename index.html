<!DOCTYPE html>
<html>
<head>
  <title>For You 😌</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .active {
      display: flex;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #1e293b;
      color: white;
      font-size: 16px;
    }

    .cake {
      font-size: 80px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- Screen 1 -->
<div class="screen active" id="s1">
  <h1>Oye 👀<br>click kar na…</h1>
  <button onclick="next('s2')">don’t click me 😏</button>
</div>

<!-- Screen 2 -->
<div class="screen" id="s2">
  <h1>Achha... click kar hi diya 😒<br>ab aage dekh</h1>
  <button onclick="next('s3')">next</button>
</div>

<!-- Screen 3 -->
<div class="screen" id="s3">
  <h1>Bas ek last cheez 😌</h1>
  <button onclick="next('s4')">open</button>
</div>

<!-- Screen 4 -->
<div class="screen" id="s4">
  <h1>
    🎂 Happy Birthday mere boondi ke laddu 😋🎉<br><br>
    I LOVE YOU and your presence SOO MUCH 🫶🏼❤️<br>
    par tu bht zyada special hai mere liye 🫶🏼<br><br>
  </h1>

  <div class="cake">🎂</div>

<button onclick="this.innerText='Bas itna hi cake milega 😐'; playConfetti()">
    cut the cake
  </button>

  <button onclick="playMusic()">
    play this 😌
  </button>
</div>

<!-- AUDIO -->
<audio id="music">
  <source src="https://raw.githubusercontent.com/vidhi-425/Vidhi/main/Screen_Recording_20260321_024039_Chrome.mp3" type="audio/mp3">
</audio>

<!-- SCRIPT -->
<script>
function next(id) {
  document.querySelector('.active').classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function playMusic() {
  let music = document.getElementById("music");
  music.volume = 0.5;
  music.play();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function playConfetti() {
  confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 }
  });
}
</script>
</body>
</html>
