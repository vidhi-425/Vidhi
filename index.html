<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0F172A;
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .active {
      display: flex;
      animation: fade 1s;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    button {
      padding: 12px 24px;
      margin-top: 20px;
      background: #3B82F6;
      border: none;
      color: white;
      border-radius: 10px;
    }

    img {
      width: 180px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio id="music" controls>
  <source src="content://media/external/downloads/1000050979" type="audio/aac">
</audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <h1>Hey… don’t click this 👀</h1>
  <button onclick="next('s2')">Okay fine, click me🙄</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <h1>Don’t get used to this…<br>I don’t usually say nice things 🫣</h1>
  <button onclick="next('s3')">Continue 😏</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <h1>But …<br>you’re actually so much important to me.<br>& I love your presence🫠</h1>
  <button onclick="next('s4')">Last one 👀</button>
</div>

<!-- FINAL SCREEN -->
<div class="screen" id="s4">
  <h1>
    🎂 Happy Birthday 🎉<br><br>
    I LOVE YOU SOO MUCH 🫶🏼❤️<br>  
  </h1>

  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Birthday_cake_2.jpg/320px-Birthday_cake_2.jpg">

  <button onclick="this.innerText='Bas itna hi cake milega 😌'">
    cut the cake
  </button>
</div>

<script>
function next(id) {
  document.querySelector('.active').classList.remove('active');
  document.getElementById(id).classList.add('active');

  if(id === 's4') {
    let music = document.getElementById("music");
    music.play().catch(() => {
      console.log("Autoplay blocked");
    });
  }
}
    </script>
</body>
</html>
